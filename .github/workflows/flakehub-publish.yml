# Publish a tagged release to FlakeHub (flakehub.com/flake/kriswill/flake-explorer).
# The OIDC id-token is the only credential — FlakeHub accepts releases
# exclusively from CI identities.
#
# The push:tags trigger covers human-pushed tags, but this repo's release
# tags are created by the Release workflow with GITHUB_TOKEN — and
# GITHUB_TOKEN-created events never trigger workflows. So release.yml also
# dispatches this workflow explicitly on the fresh tag, the same pattern it
# uses for CI and Pages. Either way the ref must be a v* tag.
#
# The build re-runs before the push (a cache hit after ci.yml has run) so
# include-output-paths records real, cached store paths with the release.
name: flakehub-publish

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch: # release.yml: gh workflow run flakehub-publish --ref vX.Y.Z

permissions:
  contents: read
  id-token: write # the FlakeHub credential (release push + cache)

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Refuse non-tag refs
        if: github.ref_type != 'tag'
        run: |
          echo "::error::flakehub-publish must run on a v* tag ref (got ${{ github.ref }})"
          exit 1

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: DeterminateSystems/determinate-nix-action@2a0be2498974c2b6327e19780488744384637d88 # v3.21.7

      - uses: DeterminateSystems/flakehub-cache-action@3be0931021788e3bb4df65f59a555039c2fa2d46 # main 2026-07

      - run: nix build .#default -L

      - uses: DeterminateSystems/flakehub-push@060a48ced97e8a164f3b733455697e9f9310d39b # main 2026-07
        with:
          visibility: public
          include-output-paths: true
