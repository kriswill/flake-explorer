name: CI

on:
  pull_request:
  push:
    branches: [main]
  # The Release workflow dispatches CI for its bot-pushed release commit
  # (GITHUB_TOKEN pushes never trigger on:push).
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      # nix is needed so the real-nix integration tests (test/mini-flake.test.ts)
      # run here and count toward coverage; the fixture is builtins-only, so no
      # store downloads happen beyond the install itself.
      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
        with:
          # Plain upstream Nix: this job only evals (builtins-only fixture,
          # no builds), so the FlakeHub cache buys nothing here and skipping
          # the OIDC login keeps fork PRs warning-free. The `nix` job below
          # is the one that builds — it uses Determinate Nix + the cache.
          determinate: false
      - run: bun install --frozen-lockfile
      - run: bun test --coverage
        env:
          # Fail loudly if nix ever goes missing instead of silently skipping
          # the integration suite (which would only show up as a coverage drop).
          FLAKE_EXPLORER_REQUIRE_NIX: "1"
      - uses: k1LoW/octocov-action@b3b6ee60482a667950f87553abf1df63217235d9 # v1.5.1

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      # Smoke-check the docs site build (no nix needed) so a broken docs
      # pipeline surfaces on the PR, not on the Pages deploy.
      - run: bun run docs

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      - run: bun install --frozen-lockfile
      - run: bunx biome ci .

  nix:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Artifact datastore reads for the octocov rust report (uploads use the
      # runtime token, no extra permission).
      actions: read
      # The OIDC JWT is the FlakeHub Cache credential (account-scoped, no
      # secret). Fork PRs get no id-token: the build still runs, the cache
      # push is skipped with a warning.
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: DeterminateSystems/determinate-nix-action@2a0be2498974c2b6327e19780488744384637d88 # v3.21.7
      - uses: DeterminateSystems/flakehub-cache-action@3be0931021788e3bb4df65f59a555039c2fa2d46 # main 2026-07
      # Builds the checks: bun tests, treefmt, and the crane-driven rust
      # test/clippy/coverage (dep layer cached in FlakeHub Cache; only the
      # crate itself recompiles on source changes).
      - run: nix flake check -L
      # flake check builds only checks.* ("build skipped" for packages), so
      # the apps themselves never reached the cache — build them explicitly.
      - run: nix build .#default .#flake-explorer-rs -L
      # Rust coverage: the rust-coverage check's output IS the lcov file
      # (cargo-llvm-cov); rewrite the sandbox build paths to repo-relative so
      # octocov can match sources, then report with the rust-specific config.
      - run: |
          nix build .#checks.$(nix eval --raw --impure --expr builtins.currentSystem).rust-coverage -o rust-cov
          mkdir -p rust-coverage
          sed 's|^SF:/build/source/|SF:|' rust-cov > rust-coverage/lcov.info
      - uses: k1LoW/octocov-action@b3b6ee60482a667950f87553abf1df63217235d9 # v1.5.1
        with:
          config: .octocov.rust.yml
