# Publish a static export of this repo's own flake to GitHub Pages: the
# explorer UI + manifest + sources materialized into one standalone
# flake.html (index.html is a copy so the site root works).
#
# One-time repo setup: Settings → Pages → Source = "GitHub Actions".

name: Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# One deployment at a time; let an in-flight one finish (GitHub's
# recommendation for Pages, so a live deploy is never cancelled mid-way).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # FlakeHub Cache credential (see ci.yml) — without it the build still
      # runs, just cold.
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      # The export shells out to nix for the manifest + source resolution;
      # Determinate Nix + FlakeHub cache also make `nix run .#` cheap (the
      # binary and its dep layer come from the cache pushed by CI).
      - uses: DeterminateSystems/determinate-nix-action@d96678350ffd6a456235832eb11e1c491589b7bb # v3.21.8
      - uses: DeterminateSystems/flakehub-cache-action@3be0931021788e3bb4df65f59a555039c2fa2d46 # main 2026-07
      - run: bun install --frozen-lockfile
      # This flake has no nixos/darwin configurations, so --all/--sources all
      # cost nothing today; they keep the demo complete if that changes.
      - run: |
          mkdir -p _site
          nix run .# -- export . --all --sources all --html _site/flake.html
          cp _site/flake.html _site/index.html
      # Docs: curated pages + TypeDoc API reference (markdown), both rendered
      # through the shared theme template into _site/docs/.
      - run: bun run docs
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
