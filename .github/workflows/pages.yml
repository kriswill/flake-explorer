# Publish a static export of this repo's own flake to GitHub Pages: the
# explorer UI + manifest + sources materialized into one standalone
# flake.html (index.html is a copy so the site root works).
#
# One-time repo setup: Settings → Pages → Source = "GitHub Actions".

name: Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# One deployment at a time; let an in-flight one finish (GitHub's
# recommendation for Pages, so a live deploy is never cancelled mid-way).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      # The export shells out to nix for the manifest + source resolution.
      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
        with:
          determinate: false # see ci.yml — no FlakeHub OIDC here
      - run: bun install --frozen-lockfile
      # This flake has no nixos/darwin configurations, so --all/--sources all
      # cost nothing today; they keep the demo complete if that changes.
      - run: |
          mkdir -p _site
          bun flake-explorer.ts export . --all --sources all --html _site/flake.html
          cp _site/flake.html _site/index.html
      # Docs: curated pages + TypeDoc API reference (markdown), both rendered
      # through the shared theme template into _site/docs/.
      - run: bun run docs
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
