# Cut a release: bump package.json (package.nix reads its version at eval
# time, the About modal at runtime), roll CHANGELOG's [Unreleased] into the
# new version section, land the bump on main THROUGH A PULL REQUEST (main's
# ruleset requires PRs + the three CI checks; the Actions app cannot bypass
# rulesets on user-owned repos), then tag the merge commit, publish a GitHub
# release with the changelog section as notes, and publish to npm.
#
# GITHUB_TOKEN quirks this flow works around:
#   - PRs created with GITHUB_TOKEN emit no pull_request events, so CI is
#     dispatched explicitly on the release branch (same check contexts â€”
#     test typescript / check typescript / build â€” so the ruleset accepts them).
#   - Pushes/merges made with GITHUB_TOKEN trigger no on:push workflows, so
#     CI and Pages are dispatched explicitly for main after the merge â€”
#     and the tag push triggers nothing either, so flakehub-publish is
#     dispatched explicitly on the fresh v* tag.
#
# If a required check fails, auto-merge never fires: the wait step times out
# and the run fails with the release PR left open for inspection â€” no tag,
# no GitHub release, no npm publish. Close or fix the PR, then re-dispatch.
#
# npm publishing lives in the `npm release` workflow (per-platform binary
# matrix), dispatched here on the fresh tag. Its trusted-publisher/token
# requirements are documented in npm-release.yml.
#
# The node_modules outputHash in package.nix is unaffected by version bumps
# (it only depends on package.json deps + bun.lock contents).

name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump
        required: true
        type: choice
        options: [patch, minor, major]

permissions:
  contents: write
  pull-requests: write # create + auto-merge the release PR
  actions: write # dispatch CI on the release branch, CI + Pages on main
  id-token: write # the OIDC token npm exchanges for the tokenless publish

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 24
      # Trusted publishing needs npm >= 11.5.1; don't trust the bundled one.
      - run: npm install -g npm@latest

      - id: bump
        run: echo "version=$(bun scripts/release.ts bump ${{ inputs.bump }})" >> "$GITHUB_OUTPUT"

      - run: bun scripts/release.ts notes "$VERSION" > "$RUNNER_TEMP/notes.md"
        env:
          VERSION: ${{ steps.bump.outputs.version }}

      # Packaging must be sound before anything is pushed anywhere: the npm
      # main package ships the launcher + the SPA bundle, so build the bundle
      # and stage the package exactly as `npm release` will.
      - run: bun install --frozen-lockfile
      - run: bun scripts/bundle-app.ts
      - run: bun scripts/build-npm.ts --main
      - run: cd dist-npm/flake-explorer && npm pack --dry-run

      - name: Open the release PR and arm auto-merge
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "release/v$VERSION"
          git commit -am "release: v$VERSION"
          git push -u origin "release/v$VERSION"
          gh pr create --base main --head "release/v$VERSION" \
            --title "release: v$VERSION" \
            --body "Automated release PR (Release workflow, ${{ inputs.bump }} bump). Merges the version bump + changelog roll; the workflow tags the merge commit and publishes once the required checks pass."
          gh workflow run CI --ref "release/v$VERSION"
          gh pr merge "release/v$VERSION" --auto --merge --delete-branch
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.bump.outputs.version }}

      - name: Wait for the release PR to merge
        id: merged
        run: |
          for _ in $(seq 60); do
            state="$(gh pr view "release/v$VERSION" --json state -q .state)"
            [ "$state" = "MERGED" ] && break
            [ "$state" = "CLOSED" ] && { echo "::error::release PR was closed without merging"; exit 1; }
            sleep 10
          done
          [ "$state" = "MERGED" ] || { echo "::error::release PR did not merge in time (checks failed or stuck?)"; exit 1; }
          echo "sha=$(gh pr view "release/v$VERSION" --json mergeCommit -q .mergeCommit.oid)" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.bump.outputs.version }}

      # The ruleset only guards the default branch; tag pushes are free.
      - name: Tag the merge commit and publish the GitHub release
        run: |
          git fetch origin main
          git tag "v$VERSION" "$MERGE_SHA"
          git push origin "v$VERSION"
          gh release create "v$VERSION" --title "v$VERSION" --notes-file "$RUNNER_TEMP/notes.md"
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.bump.outputs.version }}
          MERGE_SHA: ${{ steps.merged.outputs.sha }}

      # npm publishing needs per-platform binaries (musl/macOS matrix), so it
      # is its own workflow â€” dispatched on the fresh tag so it builds the
      # exact released tree.
      - run: |
          gh workflow run "npm release" --ref "v$VERSION" -f dry-run=false
          gh workflow run flakehub-publish --ref "v$VERSION"
          gh workflow run CI --ref main
          gh workflow run Pages --ref main
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.bump.outputs.version }}
